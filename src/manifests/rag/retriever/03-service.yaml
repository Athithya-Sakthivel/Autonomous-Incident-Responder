# 04-service.yaml – internal ClusterIP for retriever-minimal
apiVersion: v1
kind: Service
metadata:
  name: retriever-minimal-svc
  namespace: inference
  labels:
    app.kubernetes.io/name: retriever-minimal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: retriever-minimal
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP