# src/argo-apps/observability/signoz-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Athithya-Sakthivel/archived-helm-charts.git
    targetRevision: main
    path: signoz-patched
    helm:
      values: |
        global:
          storageClass: "default-storage-class"
          clusterName: "prod-eks"
          cloud: "aws"

        clickhouse:
          enabled: true
          user: "admin"
          existingSecret: "signoz-clickhouse-credentials"
          existingSecretKey: "admin-password"
          layout:
            shardsCount: 1
            replicasCount: 1
          zookeeper:
            enabled: true
            replicaCount: 1
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "6Gi"
          persistence:
            size: "20Gi"
            storageClass: "default-storage-class"
          settings:
            max_server_memory_usage_to_ram_ratio: "0.9"
          profiles:
            default/max_memory_usage: "4000000000"
            admin/max_memory_usage: "4000000000"

        signoz:
          replicaCount: 1
          resources:
            requests:
              cpu: "500m"
              memory: "500Mi"
            limits:
              cpu: "2"
              memory: "1.5Gi"
          persistence:
            size: "10Gi"
            storageClass: "default-storage-class"

          otelCollector:
            # Prevent the default ConfigMap, which hardcodes OpAmp args
            configMap:
              create: false
            # Explicitly define the collector command to bypass OpAmp
            command:
              name: "/signoz-otel-collector"
              extraArgs:
                - "--config=/conf/otel-collector-config.yaml"
                - "--copy-path=/var/tmp/collector-config.yaml"
            # Provide the full collector configuration inline
            config: |
              receivers:
                otlp:
                  protocols:
                    grpc:
                      endpoint: 0.0.0.0:4317
                      max_recv_msg_size_mib: 16
                    http:
                      endpoint: 0.0.0.0:4318
              processors:
                filter/health:
                  spans:
                    exclude:
                      match_type: regexp
                      span_names:
                        - "GET /healthz"
                        - "GET /readyz"
                        - "GET /health"
                        - "GET /startup"
                        - "GET /collections"
                      attributes:
                        - key: http.url
                          match_type: regexp
                          value: ".*/healthz|.*/readyz|.*/health|.*/collections|.*/ping"
                resource:
                  attributes:
                    - key: service.name
                      from_attribute: service.name
                      action: upsert
                batch: {}
              exporters:
                clickhousetracesexporter:
                  dsn: "tcp://$(CLICKHOUSE_USER):$(CLICKHOUSE_PASSWORD)@$(CLICKHOUSE_HOST):$(CLICKHOUSE_PORT)/"
                  cluster: "$(CLICKHOUSE_CLUSTER)"
                clickhousemetricsexporter:
                  dsn: "tcp://$(CLICKHOUSE_USER):$(CLICKHOUSE_PASSWORD)@$(CLICKHOUSE_HOST):$(CLICKHOUSE_PORT)/"
                  cluster: "$(CLICKHOUSE_CLUSTER)"
                clickhouselogsexporter:
                  dsn: "tcp://$(CLICKHOUSE_USER):$(CLICKHOUSE_PASSWORD)@$(CLICKHOUSE_HOST):$(CLICKHOUSE_PORT)/"
                  cluster: "$(CLICKHOUSE_CLUSTER)"
              extensions:
                health_check:
                  endpoint: ":13133"
                zpages:
                  endpoint: ":55679"
              service:
                extensions:
                  - health_check
                  - zpages
                pipelines:
                  traces:
                    receivers: [otlp]
                    processors: [filter/health, resource, batch]
                    exporters: [clickhousetracesexporter]
                  metrics:
                    receivers: [otlp]
                    processors: [resource, batch]
                    exporters: [clickhousemetricsexporter]
                  logs:
                    receivers: [otlp]
                    processors: [resource, batch]
                    exporters: [clickhouselogsexporter]

  destination:
    server: https://kubernetes.default.svc
    namespace: signoz
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true