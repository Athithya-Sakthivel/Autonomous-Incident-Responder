apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dense-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Athithya-Sakthivel/ticket-triage-agent.git
    targetRevision: main
    path: src/manifests/rag/dense
  destination:
    server: https://kubernetes.default.svc
    namespace: inference
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true